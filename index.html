<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eyewear Prescription Tracker</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="site-logo-bar">
        <div class="site-logo-icon">
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <path d="M32 6l6 6 8-2 2 8 6 6-6 6 2 8-8 2-6 6-6-6-8 2-2-8-6-6 6-6-2-8 8-2 6-6z" fill="#fff"/>
            <circle cx="32" cy="32" r="8" fill="#0b7285"/>
          </svg>
        </div>
        <div class="site-logo-text">
          <span>Unscene</span>
          <small>Eyewear Prescriptions</small>
        </div>
      </div>
      <div>
        <h1>Eyewear Prescription Tracker</h1>
        <p>Track prescriptions by maker, lens type, custom tint, and status.</p>
      </div>
    </header>

    <section class="form-card">
      <h2>Create New Prescription</h2>
      <div id="messageBox" class="message-box hidden"></div>
      <form id="order-form">
        <div class="field-row">
          <label for="customerName">Customer Name</label>
          <input id="customerName" name="customerName" type="text" required />
        </div>

        <div class="field-row">
          <label for="frameMaterial">Frame Material</label>
          <select id="frameMaterial" name="frameMaterial" required>
            <option value="" disabled selected>Select Material</option>
            <option value="Acetate">Acetate</option>
            <option value="Metal">Metal</option>
          </select>
        </div>

        <div class="field-row split">
          <div style="flex: 1; display: flex; flex-direction: column;">
            <label for="frameModel">Frame Model</label>
            <select id="frameModel" name="frameModel" required>
              <option value="" disabled selected>Select Model</option>
            </select>
          </div>
          <div id="frame-color-container" style="flex: 1; display: flex; flex-direction: column;">
            <label for="frameColor">Frame Color</label>
            <select id="frameColor" name="frameColor">
              <option value="" disabled selected>Select Color</option>
            </select>
          </div>
        </div>

        <div class="field-row hidden" id="custom-frame-row">
          <label for="customFrameName">Custom Frame Description</label>
          <input id="customFrameName" name="customFrameName" type="text" placeholder="e.g. Ray-Ban Wayfarer Gold Green" />
        </div>


        <div class="field-row">
          <label for="orderNumber">Order No.</label>
          <div class="order-no-container">
            <input id="orderNumber" name="orderNumber" type="text" required />
            <button type="button" id="regenerate-order-no" class="btn-icon" title="Regenerate Order No.">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="field-row">
          <label for="maker">Lens Maker</label>
          <select id="maker" name="maker" required>
            <option value="Vision RX">Vision RX</option>
            <option value="Nikon">Nikon</option>
            <option value="Yash Optics">Yash Optics</option>
          </select>
        </div>

        <div class="field-row">
          <label>Lens Type</label>
          <div class="radio-group" style="display: flex; gap: 20px; margin-top: 6px;">
            <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer; color: var(--text);">
              <input type="radio" id="lensTypeSingle" name="lensType" value="Single Vision" checked />
              Single Vision
            </label>
            <label id="lensTypeProgressiveLabel" style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer; color: var(--text);">
              <input type="radio" id="lensTypeProgressive" name="lensType" value="Progressive" />
              Progressive
            </label>
          </div>
        </div>

        <div class="field-row">
          <label for="product">Product</label>
          <select id="product" name="product" required>
            <option value="" disabled selected>Select Product</option>
          </select>
        </div>

        <div class="field-row" id="index-row">
          <label for="lensIndex">Lens Index</label>
          <select id="lensIndex" name="lensIndex">
            <option value="" disabled selected>Select Index</option>
          </select>
        </div>

        <div class="field-row hidden" id="custom-product-row">
          <label for="customProduct">Custom Product Name</label>
          <input id="customProduct" name="customProduct" type="text" placeholder="Enter custom product name..." />
        </div>

        <div class="field-row hidden" id="price-info-row">
          <label>Price Reference (Internal)</label>
          <div id="price-info-display" class="price-display-box">
            <!-- Dynamically populated -->
          </div>
        </div>

        <div class="field-row">
          <label>ARC Coating / Add-Ons</label>
          <div class="radio-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px;">
            <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer; color: var(--text);">
              <input type="radio" id="coatingBackside" name="coating" class="coating-radio" value="Backside Green ARC" />
              Backside Green ARC
            </label>
            <label style="display: flex; align-items: center; gap: 8px; font-weight: normal; cursor: pointer; color: var(--text);">
              <input type="radio" id="coatingBothSide" name="coating" class="coating-radio" value="Both side Green ARC" checked />
              Both side Green ARC
            </label>
          </div>
          <input type="hidden" id="productAddOn" name="productAddOn" value="Both side Green ARC" />
        </div>

        <div class="field-row">
          <label for="tintType">Tint Type</label>
          <select id="tintType" name="tintType">
            <option value="APT">APT</option>
            <option value="Clear" selected>Clear</option>
            <option value="Custom">Custom</option>
          </select>
        </div>

        <div class="field-row hidden" id="custom-tint-row">
          <label for="customTintColor">Custom Tint Color</label>
          <input id="customTintColor" name="customTintColor" type="text" placeholder="Enter custom tint color..." />
        </div>

        <div class="field-row hidden" id="apt-color-row">
          <label for="aptColor">APT Color</label>
          <select id="aptColor" name="aptColor">
            <option value="" disabled selected>Choose Tint</option>
            <option value="Green Fade">Green Fade</option>
            <option value="Brown">Brown</option>
            <option value="Purple">Purple</option>
            <option value="Orange">Orange</option>
            <option value="Yellow">Yellow</option>
            <option value="Blue">Blue</option>
            <option value="Sky Blue">Sky Blue</option>
            <option value="Peach">Peach</option>
            <option value="Black">Black</option>
            <option value="Brown Fade">Brown Fade</option>
            <option value="Black Fade">Black Fade</option>
            <option value="Green">Green</option>
            <option value="Olive">Olive</option>
            <option value="Rose">Rose</option>
          </select>
        </div>

        <div class="field-row split">
          <div>
            <label for="rightSphere">R Sph</label>
            <input id="rightSphere" name="rightSphere" type="text" placeholder="e.g. -2.00" />
          </div>
          <div>
            <label for="leftSphere">L Sph</label>
            <input id="leftSphere" name="leftSphere" type="text" placeholder="e.g. -1.75" />
          </div>
        </div>

        <div class="field-row split">
          <div>
            <label for="rightCylinder">R Cyl</label>
            <input id="rightCylinder" name="rightCylinder" type="text" placeholder="e.g. -0.50" />
          </div>
          <div>
            <label for="leftCylinder">L Cyl</label>
            <input id="leftCylinder" name="leftCylinder" type="text" placeholder="e.g. -0.75" />
          </div>
        </div>

        <div class="field-row split">
          <div>
            <label for="rightAxis">R Axis</label>
            <input id="rightAxis" name="rightAxis" type="text" placeholder="e.g. 180" />
          </div>
          <div>
            <label for="leftAxis">L Axis</label>
            <input id="leftAxis" name="leftAxis" type="text" placeholder="e.g. 90" />
          </div>
        </div>


        <div class="field-row split">
          <div>
            <label for="rightAdd">R Add</label>
            <input id="rightAdd" name="rightAdd" type="text" placeholder="e.g. +2.00" />
          </div>
          <div>
            <label for="leftAdd">L Add</label>
            <input id="leftAdd" name="leftAdd" type="text" placeholder="e.g. +2.00" />
          </div>
        </div>

        <div class="field-row split">
          <div>
            <label for="pupillaryDistanceDist">PD (Dist)</label>
            <input id="pupillaryDistanceDist" name="pupillaryDistanceDist" type="text" placeholder="e.g. 62" />
          </div>
          <div>
            <label for="pupillaryDistanceNear">PD (Near)</label>
            <input id="pupillaryDistanceNear" name="pupillaryDistanceNear" type="text" placeholder="e.g. 56" />
          </div>
        </div>



        <div class="field-row">
          <label for="notes">Notes</label>
          <textarea id="notes" name="notes" rows="3" placeholder="Optional notes"></textarea>
        </div>

        <div class="buttons">
          <button type="submit" class="primary">Save Prescription</button>
        </div>
      </form>
    </section>

    <section class="tracker-card">
      <h2>Track Orders</h2>
      <p>Use this separate page to view and manage all saved prescriptions.</p>
      <div class="buttons">
        <a href="track.html" class="secondary">Open Tracking Page</a>
      </div>
    </section>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
