<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prescription Tracking</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="site-logo-bar">
        <div class="site-logo-icon">
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <path d="M32 6l6 6 8-2 2 8 6 6-6 6 2 8-8 2-6 6-6-6-8 2-2-8-6-6 6-6-2-8 8-2 6-6z" fill="#fff"/>
            <circle cx="32" cy="32" r="8" fill="#0b7285"/>
          </svg>
        </div>
        <div class="site-logo-text">
          <span>Unscene</span>
          <small>Eyewear Prescriptions</small>
        </div>
      </div>
      <div>
        <h1>Prescription Tracking</h1>
        <p>View, print, and manage prescriptions by maker on a separate page.</p>
      </div>
    </header>

    <section class="tracker-card">
      <div class="buttons">
        <a href="index.html" class="secondary">Create New Prescription</a>
      </div>

      <div class="filter-bar">
        <div class="filter-group">
          <label for="filterMaker">Maker</label>
          <select id="filterMaker">
            <option value="All">All</option>
            <option value="Vision RX">Vision RX</option>
            <option value="Nikon">Nikon</option>
            <option value="Yash Optics">Yash Optics</option>
            <option value="Crizal">Crizal</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filterLensType">Lens Type</label>
          <select id="filterLensType">
            <option value="All">All</option>
            <option value="Single Vision">Single Vision</option>
            <option value="Progressive">Progressive</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filterStatus">Status</label>
          <select id="filterStatus">
            <option value="All">All</option>
            <option value="Ordered">Ordered</option>
            <option value="In Production">In Production</option>
            <option value="Ready">Ready</option>
            <option value="Delivered">Delivered</option>
          </select>
        </div>

        <div class="filter-group search-group">
          <label for="filterSearch">Search</label>
          <input id="filterSearch" type="text" placeholder="Customer or order #" />
        </div>

        <button id="clearFilters" class="secondary">Clear Filters</button>
      </div>

      <div id="ordersContainer"></div>
    </section>
  </div>

  <script type="module" src="track.js"></script>
</body>
</html>
